<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:hsl(187,74%,32%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(270,70%,45%);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:hsl(187,74%,52%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(270,70%,65%);stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>
  <!-- Gradient accent line -->
  <rect x="100" y="250" width="120" height="4" rx="2" fill="url(#accent)"/>
  <!-- Name -->
  <text x="100" y="330" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700" font-size="72" fill="white">Rosen Velikov</text>
  <!-- Subtitle -->
  <text x="100" y="390" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="400" font-size="32" fill="url(#textGrad)">AI Infrastructure Engineer</text>
  <!-- Tags -->
  <text x="100" y="440" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-weight="400" font-size="22" fill="#9ca3af">Voice AI  |  Distributed Systems  |  Carrier-Grade Security</text>
  <!-- URL -->
  <text x="100" y="560" font-family="ui-monospace,monospace" font-weight="400" font-size="18" fill="#6b7280">djok.github.io/me</text>
  <!-- RV badge -->
  <rect x="1020" y="80" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="1060" y="133" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="36" fill="white">RV</text>
</svg>
